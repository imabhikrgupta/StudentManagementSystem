<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            margin: 0; padding: 0;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .profile-card {
            display: inline-block;
            padding: 20px;
            border-radius: 12px;
            background: #fafafa;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .profile-card:hover {
            transform: scale(1.05);
        }
        .profile-img {
            width: 120px; height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #2196F3;
        }
        h2 { margin: 10px 0; color: #333; }
        p { margin: 5px 0; color: #555; }

        /* Modal styling */
        .modal {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            text-align: left;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        .close {
            float: right;
            font-size: 22px;
            cursor: pointer;
            color: #999;
        }
        .close:hover { color: #000; }
        .info-row {
            margin: 10px 0;
        }
        .label {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Profile Card -->
        <div class="profile-card" onclick="openModal()">
            <img src="student.jpg" alt="Profile Image" class="profile-img">
            <h2>Abhishek Kumar</h2>
            <p>Roll No: 101</p>
            <p>Email: abhishek@mail.com</p>
        </div>
    </div>

    <!-- Modal -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Student Profile</h2>
            <div class="info-row"><span class="label">Name:</span> Abhishek Kumar</div>
            <div class="info-row"><span class="label">Roll No:</span> 101</div>
            <div class="info-row"><span class="label">Father's Name:</span> Ramesh Kumar</div>
            <div class="info-row"><span class="label">Marks:</span> 95.5</div>
            <div class="info-row"><span class="label">Email:</span> abhishek@mail.com</div>
            <div class="info-row"><span class="label">Phone:</span> 9876543210</div>
        </div>
    </div>

    <script>
        function openModal() {
            document.getElementById("profileModal").style.display = "flex";
        }
        function closeModal() {
            document.getElementById("profileModal").style.display = "none";
        }
    </script>
</body>
</html>
