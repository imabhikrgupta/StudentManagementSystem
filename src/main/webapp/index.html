<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0; padding: 0;
            background: #f4f4f9;
        }
        header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            display: flex;
            justify-content: center;
            background: #333;
        }
        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            text-align: center;
        }
        nav a:hover {
            background: #575757;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            color: #333;
        }
        .cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            flex: 1 1 200px;
            background: #e9f5e9;
            padding: 20px;
            border-radius: 8px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
            background: #d9f0d9;
        }
        .card a {
            text-decoration: none;
            color: #4CAF50;
            font-weight: bold;
        }
        footer {
            text-align: center;
            padding: 15px;
            background: #333;
            color: white;
            margin-top: 40px;
        }
        /* Responsive */
        @media (max-width: 600px) {
            nav { flex-direction: column; }
            .cards { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Student Management System</h1>
    </header>

    <nav>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
        <a href="ViewStudentsServlet">View Students</a>
        <a href="update.html">Update</a>
        <a href="delete.html">Delete</a>
    </nav>

    <div class="container">
        <h2>Welcome!</h2>
        <p>Select an option below to manage students:</p>
        <div class="cards">
            <div class="card"><a href="register.html">➕ Register Student</a></div>
            <div class="card"><a href="login.html">🔑 Login</a></div>
            <div class="card"><a href="ViewStudentsServlet">📋 View Students</a></div>
            <div class="card"><a href="update.html">✏️ Update Student</a></div>
            <div class="card"><a href="delete.html">🗑️ Delete Student</a></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Student Management System | Designed by Abhishek</p>
    </footer>
</body>
</html>
