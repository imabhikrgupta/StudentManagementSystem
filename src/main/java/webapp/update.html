<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Student</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            margin: 0; padding: 0;
        }
        .container {
            max-width: 450px;
            margin: 60px auto;
            padding: 25px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        input[type=text], input[type=email] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        input[type=submit] {
            width: 100%;
            padding: 12px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        input[type=submit]:hover {
            background: #1976D2;
        }
        .note {
            text-align: center;
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            .container { margin: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Update Student</h2>
        <form action="UpdateStudentServlet" method="post">
            <input type="text" name="roll" placeholder="Enter Roll No" required>
            <input type="email" name="email" placeholder="New Email" required>
            <input type="text" name="phone" placeholder="New Phone Number" required>
            <input type="submit" value="Update">
        </form>
        <div class="note">
            <p>Provide Roll No and new details to update student record.</p>
        </div>
    </div>
</body>
</html>
